<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="112.88889mm"
   height="112.88889mm"
   viewBox="0 0 400 400"
   id="svg_plus_icon_v2"
   version="1.1">
  
  <!-- Hintergrundkreis -->
  <circle
     style="fill:#48b02c;"
     cx="200"
     cy="200"
     r="200" />

  <!-- Geometrisches Pluszeichen (Kreuz), zentriert, Farbe: #FFFFFF -->
  <!-- Anpassung: Balken schmaler und länger -->
  <g style="fill:#FFFFFF;">
    <!-- Vertikaler Balken -->
    <rect
       x="185" 
       y="75" 
       width="30"
       height="250" /> 
    <!-- Horizontaler Balken -->
    <rect
       x="75" 
       y="185"
       width="250"
       height="30" />
  </g>
</svg>